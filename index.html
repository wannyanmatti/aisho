<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイショウ — Skincare Ingredient Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: linear-gradient(160deg, #fce8ec 0%, #fff5f5 50%, #fde8f0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: #2E1A22;
  }

  .pip {
    width: 10px; height: 10px; border-radius: 50%;
    background: #C06C84;
    box-shadow: 0 0 10px rgba(192,108,132,0.5);
    display: inline-block;
    margin-right: 8px;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .tagline {
    font-size: clamp(13px, 2vw, 16px);
    color: #9A7882;
    margin-bottom: 56px;
    letter-spacing: 0.5px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 560px;
  }

  .card {
    background: #fff;
    border: 1px solid #F0D5DB;
    border-radius: 20px;
    padding: 28px 32px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 4px 20px rgba(192,108,132,0.06);
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(192,108,132,0.14);
  }

  .card-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .icon-user  { background: #FADADD; }
  .icon-biz   { background: #2E1A22; font-size: 20px; }

  .card-text {}
  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #C06C84;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 12.5px;
    color: #9A7882;
    line-height: 1.6;
  }

  .arrow {
    margin-left: auto;
    font-size: 20px;
    color: #F2B8C0;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 56px;
    font-size: 11.5px;
    color: #C4A8AF;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

  <h1><span class="pip"></span>アイショウ</h1>
  <p class="tagline">肌との相性は、感覚ではなく記録から見える</p>

  <div class="cards">
    <a class="card" href="aisho_v2_mockup.html">
      <div class="card-icon icon-user">🌸</div>
      <div class="card-text">
        <div class="card-label">User App</div>
        <div class="card-title">ユーザー向けアプリ</div>
        <div class="card-desc">商品を記録するだけで、肌との相性がデータになる。ホーム・カレンダー・成分レポートの3画面。</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="aisho_biz_dashboard_v2.html">
      <div class="card-icon icon-biz">📊</div>
      <div class="card-text">
        <div class="card-label" style="color:#9A7882">Business Dashboard</div>
        <div class="card-title">企業向けダッシュボード</div>
        <div class="card-desc">成分×年代の好感度ヒートマップ、ユーザー分析、成分検索など。化粧品メーカー向けBtoBビュー。</div>
      </div>
      <span class="arrow" style="color:#3D5468">›</span>
    </a>
  </div>

  <div class="footer">
    アイショウ プロジェクト 2026<br>
    Skincare Ingredient Tracker — Prototype Mockup
  </div>

</body>
</html>
